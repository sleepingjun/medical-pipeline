# ============================================================
# 檔案名稱：docker-compose.yml
# 功能說明：啟動本地開發環境所需的兩個容器服務
#           - PostgreSQL：主力本地資料庫（raw layer 儲存）
#           - MSSQL：副修資料庫，練習語法差異用
# 執行方式：docker compose up -d
# 停止方式：docker compose down
# 注意事項：
#   - MSSQL 密碼需符合複雜度要求（大小寫+數字+符號，最少8碼）
#   - 資料會存在 named volume，docker compose down 不會刪資料
#     若要完全清除：docker compose down -v
# 最後更新：2026-04-13
# ============================================================

services:

  postgres:
    image: postgres:16
    container_name: medical_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: medical_mssql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

volumes:
  postgres_data:
  mssql_data: